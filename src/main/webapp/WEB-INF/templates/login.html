<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — Frudoko</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/frudoko.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
    <link rel="stylesheet" th:href="@{/fragments/animationBG}"/>
    <link rel="icon" th:href="@{/images/apple.png}" type="image/png">

</head>
<body class="fruit-bg d-flex align-items-center justify-content-center" style="min-height:100vh">

<!--bg animation-->
<div th:replace="~{fragments/animationBG :: animation}"></div>
<div class="auth-card">
    <!-- Header -->
    <div class="text-center mb-4">
        <a th:href="@{/home}" class="text-decoration-none">
            <span style="font-size:2.5rem">🍇</span>
        </a>
        <h3 class="mt-2 text-white fw-bold">Connexion</h3>
        <p class="text-white-50 small">Bienvenue sur Frudoko !</p>
    </div>
    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger alert-sm text-center py-2 mb-3" th:text="${error}"></div>

    <!--login form-->
    <form method="post"  th:action="@{/login}" novalidate>

        <div class="mb-3">
            <label class="form-label text-white-50 small">Email</label>
            <input type="email"
                   name="email"
                   class="form-control auth-input"
                   placeholder="votre@email.com"
                   required
                   autocomplete="email"/>
        </div>

        <div class="mb-4">
            <label class="form-label text-white-50 small">Mot de passe</label>
            <div class="input-group">
                <input type="password"
                       id="passwordInput"
                       name="password"
                       class="form-control auth-input"
                       placeholder="••••••••"
                       required
                       autocomplete="current-password"/>
                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword('passwordInput', this)"
                        tabindex="-1">👁️</button>
            </div>
        </div>

        <button type="submit" class="btn btn-fruit w-100 py-2 mb-3">
            Se connecter →
        </button>

    </form>



</div>
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
