<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Frudoko — Fruit Sudoku</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/frudoko.css}"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="icon" th:href="@{/images/apple.png}" type="image/png">
    <link rel="icon" th:href="@{/images/apple.png}" type="image/png">
</head>
<body>
<th:block th:with="
    apple   =@{/images/apple.png},
    banana  =@{/images/banana.png},
    grape   =@{/images/grape.png},
    orange  =@{/images/orange.png},

    sparkle =@{/images/sparkle.png},
    key    =@{/images/key.png},
    trophy    =@{/images/trophy.png},
">

<!--bg animation-->
<div  class="particles" aria-hidden="true">
    <span></span>
    <span><img th:src="${apple}" class="fruit-icon" ></span>
    <span><img th:src="${grape}" class="fruit-icon"></span>
    <span> <img th:src="${orange}" class="fruit-icon"></span>
    <span> <img th:src="${banana}"class="fruit-icon" ></span>

    <span><img th:src="${apple}" class="fruit-icon" ></span>
    <span><img th:src="${grape}" class="fruit-icon"></span>
    <span> <img th:src="${orange}" class="fruit-icon"></span>
    <span> <img th:src="${banana}"class="fruit-icon" ></span>

    <span><img th:src="${apple}" class="fruit-icon" ></span>
    <span><img th:src="${grape}" class="fruit-icon"></span>
    <span> <img th:src="${orange}" class="fruit-icon"></span>
    <span> <img th:src="${banana}"class="fruit-icon" ></span>

</div>

<!-- ── Hero section ──────────────────────────────────────────── -->
<div class="hero-section d-flex flex-column align-items-center justify-content-center text-center">

    <div class="fruit-title mb-2">
        <span><img th:src="${apple}" class="fruit-icon  fruit-icon--title " ></span>
        Frudoko
        <span><img th:src="${orange}" class="fruit-icon  fruit-icon--title" ></span>
        </div>
    <p class="hero-subtitle mb-5">Le Sudoku aux fruits — simple, coloré, addictif !</p>

    <!-- 4x4 preview grid -->
    <div class="preview-grid mb-5" aria-hidden="true">
        <!-- row 1 -->
        <span><img th:src="${apple}" class="fruit-icon"></span>
        <span><img th:src="${banana}" class="fruit-icon"></span>
        <span><img th:src="${grape}" class="fruit-icon"></span>
        <span><img th:src="${orange}" class="fruit-icon"></span>

        <!-- row 2 -->
        <span><img th:src="${grape}" class="fruit-icon"></span>
        <span><img th:src="${orange}" class="fruit-icon"></span>
        <span><img th:src="${apple}" class="fruit-icon"></span>
        <span><img th:src="${banana}" class="fruit-icon"></span>

        <!-- row 3 -->
        <span><img th:src="${banana}" class="fruit-icon"></span>
        <span><img th:src="${apple}" class="fruit-icon"></span>
        <span><img th:src="${orange}" class="fruit-icon"></span>
        <span><img th:src="${grape}" class="fruit-icon"></span>

        <!-- row 4 -->
        <span><img th:src="${orange}" class="fruit-icon"></span>
        <span><img th:src="${grape}" class="fruit-icon"></span>
        <span><img th:src="${banana}" class="fruit-icon"></span>
        <span><img th:src="${apple}" class="fruit-icon"></span>
    </div>

    <div class="d-flex gap-3 flex-wrap justify-content-center">
        <a th:href="@{/login}"    class="btn btn-fruit btn-lg px-5">

            <img th:src="${key}" class="fruit-icon btn-icon">  Se connecter</a>
        <a th:href="@{/register}" class="btn btn-outline-fruit btn-lg px-5">
            <img th:src="${sparkle}" class="fruit-icon btn-icon "> S'inscrire</a>
    </div>

    <a th:href="@{/scoreboard}" class="mt-4 text-white-50 text-decoration-none hover-white">
        <img th:src="${trophy}" class="fruit-icon btn-icon">  Voir le classement
    </a>
</div>
</th:block>
</body>
</html>
